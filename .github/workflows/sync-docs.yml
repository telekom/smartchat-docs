name: Sync external docs from GitLab

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if no changes'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clone GitLab docs repo (main)
        run: |
          git clone --depth 1 --branch main \
            https://${GITLAB_DEPLOY_TOKEN_USER}:${GITLAB_DEPLOY_TOKEN}@gitlab.devops.telekom.de/ai/genai/ai-foundation-services/smartchat/docs.git \
            source
        env:
          GITLAB_DEPLOY_TOKEN_USER: ${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Clone next branch (if it exists)
        id: next
        run: |
          if git clone --depth 1 --branch next \
            https://${GITLAB_DEPLOY_TOKEN_USER}:${GITLAB_DEPLOY_TOKEN}@gitlab.devops.telekom.de/ai/genai/ai-foundation-services/smartchat/docs.git \
            source-next 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "next_sha=$(git -C source-next rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITLAB_DEPLOY_TOKEN_USER: ${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Check if source has changed
        id: check
        run: |
          SOURCE_SHA=$(git -C source rev-parse HEAD)
          echo "Source SHA: ${SOURCE_SHA}"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

          LAST_SHA=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/.source-sha" || echo "")
          echo "Last SHA: ${LAST_SHA:-none}"

          LAST_NEXT_SHA=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/.source-sha-next" || echo "")
          NEXT_SHA="${{ steps.next.outputs.next_sha }}"
          echo "Next SHA: ${NEXT_SHA:-none}, Last next SHA: ${LAST_NEXT_SHA:-none}"

          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ] || [ "$SOURCE_SHA" != "$LAST_SHA" ] || { [ -n "$NEXT_SHA" ] && [ "$NEXT_SHA" != "$LAST_NEXT_SHA" ]; }; then
            echo "Rebuild triggered (force=${FORCE})"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        if: steps.check.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install d2
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v0.7.1/d2-v0.7.1-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo mv /tmp/d2-v0.7.1/bin/d2 /usr/local/bin/d2
          chmod +x /usr/local/bin/d2

      - name: Build external docs (main)
        if: steps.check.outputs.changed == 'true'
        working-directory: source
        run: |
          bun install --silent
          BUILD_TARGET=external RELEASE_SCOPE=current bun run build > /dev/null 2>&1
          rm -rf dist/internal

      - name: Build external docs (next)
        if: steps.check.outputs.changed == 'true' && steps.next.outputs.exists == 'true'
        working-directory: source-next
        run: |
          bun install --silent
          BUILD_TARGET=external BASE_PATH=/next RELEASE_SCOPE='' bun run build > /dev/null 2>&1
          rm -rf dist/internal
          mv dist ../source/dist/next

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        run: |
          cd source/dist
          touch .nojekyll
          echo "docs.smartchat.ai.t-systems.net" > CNAME
          echo "${{ steps.check.outputs.source_sha }}" > .source-sha
          if [ "${{ steps.next.outputs.exists }}" = "true" ]; then
            echo "${{ steps.next.outputs.next_sha }}" > .source-sha-next
          fi
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy external docs from ${SOURCE_SHA:0:8}"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages
        env:
          SOURCE_SHA: ${{ steps.check.outputs.source_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
