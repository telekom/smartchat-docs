name: Sync external docs from GitLab

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clone GitLab docs repo
        run: |
          git clone --depth 1 --branch main \
            https://${GITLAB_DEPLOY_TOKEN_USER}:${GITLAB_DEPLOY_TOKEN}@gitlab.devops.telekom.de/ai/genai/ai-foundation-services/smartchat/docs.git \
            source
        env:
          GITLAB_DEPLOY_TOKEN_USER: ${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Check if source has changed
        id: check
        run: |
          SOURCE_SHA=$(git -C source rev-parse HEAD)
          echo "Source SHA: ${SOURCE_SHA}"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

          LAST_SHA=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/main/.source-sha" || echo "")
          echo "Last SHA: ${LAST_SHA:-none}"

          if [ "$SOURCE_SHA" = "$LAST_SHA" ]; then
            echo "No changes — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commit detected"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        if: steps.check.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install d2
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v0.7.1/d2-v0.7.1-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo mv /tmp/d2-v0.7.1/bin/d2 /usr/local/bin/d2
          chmod +x /usr/local/bin/d2

      - name: Build external docs
        if: steps.check.outputs.changed == 'true'
        working-directory: source
        run: |
          bun install
          BUILD_TARGET=external RELEASE_SCOPE=current bun run build
          rm -rf dist/internal

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        run: |
          cd source/dist
          echo "${{ steps.check.outputs.source_sha }}" > .source-sha
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy external docs from ${SOURCE_SHA:0:8}"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push --force origin main
        env:
          SOURCE_SHA: ${{ steps.check.outputs.source_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
