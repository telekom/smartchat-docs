name: Sync external docs from GitLab

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  GITLAB_API: https://gitlab.devops.telekom.de/api/v4
  GITLAB_PROJECT: ai%2Fgenai%2Fai-foundation-services%2Fsmartchat%2Fdocs

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest GitLab commit SHA
        id: check
        run: |
          SOURCE_SHA=$(curl -sf \
            --header "DEPLOY-TOKEN: ${GITLAB_DEPLOY_TOKEN}" \
            "${GITLAB_API}/projects/${GITLAB_PROJECT}/repository/branches/main" \
            | jq -r '.commit.id')
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

          LAST_SHA=""
          LAST_SHA_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/.source-sha"
          LAST_SHA=$(curl -sf "$LAST_SHA_URL" || echo "")

          if [ "$SOURCE_SHA" = "$LAST_SHA" ]; then
            echo "No changes — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commit: ${SOURCE_SHA} (was: ${LAST_SHA:-none})"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Download external build artifact
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -sf \
            --header "DEPLOY-TOKEN: ${GITLAB_DEPLOY_TOKEN}" \
            "${GITLAB_API}/projects/${GITLAB_PROJECT}/jobs/artifacts/main/download?job=build:external" \
            -o artifacts.zip
          mkdir dist
          unzip -o artifacts.zip -d dist
        env:
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        run: |
          cd dist/dist
          echo "${{ steps.check.outputs.source_sha }}" > .source-sha
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy external docs from ${SOURCE_SHA:0:8}"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push --force origin main
        env:
          SOURCE_SHA: ${{ steps.check.outputs.source_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
